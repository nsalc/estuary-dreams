<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estuary Dreams</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #ed-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    #ed-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    #ed-bg    { z-index: 1; }
    #ed-frame { z-index: 2; mix-blend-mode: screen; }
    #ed-title { z-index: 3; mix-blend-mode: screen; }
    #ed-menu  { z-index: 4; mix-blend-mode: screen; }
  </style>
</head>
<body>

  <div id="ed-wrapper">
    <img id="ed-bg"    src="assets/background.jpg" alt="" />
    <img id="ed-frame" src="assets/nav-frame.png"  alt="" />
    <img id="ed-title" src="assets/title.png"      alt="Estuary Dreams" />
    <img id="ed-menu"  src="assets/menu.png"       alt="" />
  </div>

</body>
</html>
